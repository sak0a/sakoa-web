name: Deploy to Ubuntu Root Server (Bun)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Build project
      run: bun run build
      env:
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_PORT: ${{ secrets.DB_PORT }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ secrets.DB_NAME }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}

    - name: Copy data files
      run: bun run copy-data

    - name: Stop application service
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ROOT_SERVER_HOST }}
        username: ${{ secrets.ROOT_SERVER_USER }}
        password: ${{ secrets.ROOT_SERVER_PASSWORD }}
        script: |
          echo "Stopping dodgeball application service..."
          if sudo -n systemctl stop dodgeball-app 2>/dev/null; then
            echo "Service stopped successfully"
          else
            echo "Could not stop service (may not be running)"
          fi

    - name: Prepare deployment directory
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ROOT_SERVER_HOST }}
        username: ${{ secrets.ROOT_SERVER_USER }}
        password: ${{ secrets.ROOT_SERVER_PASSWORD }}
        script: |
          echo "Preparing deployment directory..."
          mkdir -p /home/dodgeball-user/app

          # Backup current deployment (excluding data files)
          if [ -d "/home/dodgeball-user/app/.output" ]; then
            echo "Creating backup of current deployment..."
            rm -rf /home/dodgeball-user/app-backup 2>/dev/null || true
            cp -r /home/dodgeball-user/app /home/dodgeball-user/app-backup 2>/dev/null || true
          fi

          # Clear built output only — preserve server/data for admin GUI persistence
          echo "Clearing built output..."
          rm -rf /home/dodgeball-user/app/.output 2>/dev/null || true

          # Ensure the persistent data directory exists
          mkdir -p /home/dodgeball-user/app/server/data
          echo "Deployment directory prepared"

    - name: Upload built files
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.ROOT_SERVER_HOST }}
        username: ${{ secrets.ROOT_SERVER_USER }}
        password: ${{ secrets.ROOT_SERVER_PASSWORD }}
        source: ".output/*"
        target: "/home/dodgeball-user/app"
        strip_components: 0

    - name: Seed data files (only new files, never overwrite)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.ROOT_SERVER_HOST }}
        username: ${{ secrets.ROOT_SERVER_USER }}
        password: ${{ secrets.ROOT_SERVER_PASSWORD }}
        source: "server/data/*"
        target: "/home/dodgeball-user/app-data-seed"
        strip_components: 0

    - name: Merge seed data and set permissions
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ROOT_SERVER_HOST }}
        username: ${{ secrets.ROOT_SERVER_USER }}
        password: ${{ secrets.ROOT_SERVER_PASSWORD }}
        script: |
          echo "Seeding missing data files (preserving existing)..."
          SEED_DIR="/home/dodgeball-user/app-data-seed/server/data"
          DATA_DIR="/home/dodgeball-user/app/server/data"

          if [ -d "$SEED_DIR" ]; then
            for file in "$SEED_DIR"/*.json; do
              filename=$(basename "$file")
              if [ ! -f "$DATA_DIR/$filename" ]; then
                echo "Seeding $filename (new file)"
                cp "$file" "$DATA_DIR/$filename"
              else
                echo "Keeping existing $filename"
              fi
            done
            rm -rf /home/dodgeball-user/app-data-seed
          fi

          echo "Setting file permissions..."
          if sudo -n chown -R dodgeball-user:dodgeball-user /home/dodgeball-user/app 2>/dev/null; then
            echo "File ownership set"
          fi
          find /home/dodgeball-user/app/.output -type f -exec chmod 644 {} \; 2>/dev/null || true
          find /home/dodgeball-user/app/.output -type d -exec chmod 755 {} \; 2>/dev/null || true
          find /home/dodgeball-user/app/server -type f -exec chmod 644 {} \; 2>/dev/null || true
          find /home/dodgeball-user/app/server -type d -exec chmod 755 {} \; 2>/dev/null || true
          chmod +x /home/dodgeball-user/app/.output/server/index.mjs 2>/dev/null || true
          echo "Permissions set"

    - name: Create environment file
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ROOT_SERVER_HOST }}
        username: ${{ secrets.ROOT_SERVER_USER }}
        password: ${{ secrets.ROOT_SERVER_PASSWORD }}
        script: |
          cat > /home/dodgeball-user/app/.output/server/.env << 'ENVEOF'
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          STEAM_API_KEY=${{ secrets.STEAM_API_KEY }}
          PORT=3000
          HOST=127.0.0.1
          ENVEOF
          # Strip leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' /home/dodgeball-user/app/.output/server/.env
          chmod 600 /home/dodgeball-user/app/.output/server/.env
          echo "Environment file created"

    - name: Upload and install systemd service
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.ROOT_SERVER_HOST }}
        username: ${{ secrets.ROOT_SERVER_USER }}
        password: ${{ secrets.ROOT_SERVER_PASSWORD }}
        source: "deployment/dodgeball-app.service"
        target: "/tmp/"
        strip_components: 1

    - name: Install systemd service file
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ROOT_SERVER_HOST }}
        username: ${{ secrets.ROOT_SERVER_USER }}
        password: ${{ secrets.ROOT_SERVER_PASSWORD }}
        script: |
          if sudo -n cp /tmp/dodgeball-app.service /etc/systemd/system/dodgeball-app.service 2>/dev/null; then
            sudo -n chmod 644 /etc/systemd/system/dodgeball-app.service 2>/dev/null || true
            sudo -n chown root:root /etc/systemd/system/dodgeball-app.service 2>/dev/null || true
            sudo -n systemctl daemon-reload 2>/dev/null || true
            echo "Systemd service file installed"
          else
            echo "Failed to install service file - requires sudo"
          fi
          rm -f /tmp/dodgeball-app.service 2>/dev/null || true

    - name: Start application service
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ROOT_SERVER_HOST }}
        username: ${{ secrets.ROOT_SERVER_USER }}
        password: ${{ secrets.ROOT_SERVER_PASSWORD }}
        script: |
          sudo -n systemctl daemon-reload 2>/dev/null || true

          if sudo -n systemctl start dodgeball-app 2>/dev/null; then
            sudo -n systemctl enable dodgeball-app 2>/dev/null || true
            sleep 10

            if sudo -n systemctl is-active --quiet dodgeball-app 2>/dev/null; then
              echo "Application service is running"
            else
              echo "Service failed to start"
              sudo -n journalctl -u dodgeball-app --no-pager -n 30 2>/dev/null || true
            fi
          else
            echo "Could not start service - manual restart required"
          fi

    - name: Verify deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ROOT_SERVER_HOST }}
        username: ${{ secrets.ROOT_SERVER_USER }}
        password: ${{ secrets.ROOT_SERVER_PASSWORD }}
        script: |
          echo "=== Deployment verification ==="

          # Check main app file
          test -f /home/dodgeball-user/app/.output/server/index.mjs && echo "App file: OK" || echo "App file: MISSING"

          # Check env file
          test -f /home/dodgeball-user/app/.output/server/.env && echo "Env file: OK" || echo "Env file: MISSING"

          # Check data files
          echo "Data files:"
          ls -la /home/dodgeball-user/app/server/data/ 2>/dev/null || echo "  Data directory missing"

          # Check app responding
          if curl -f -s http://127.0.0.1:3000 > /dev/null; then
            echo "App health: OK (port 3000)"
          else
            echo "App health: NOT RESPONDING"
          fi

          # Service status
          sudo -n systemctl status dodgeball-app --no-pager -l 2>/dev/null || true
