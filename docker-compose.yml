version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE:-ghcr.io/your-github-username/dodgeball-server:latest}
    container_name: dodgeball-server-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - server-data:/app/server/data

volumes:
  server-data:
